                    `سيتم حذف <strong>${count}</strong> كرت تم مشاركته سابقاً. هذا الإجراء لا يمكن التراجع عنه.`,
                    () => {
                        const deleted = this.storage.clearShared();
                        this.renderStats();
                        this.renderTable();
                        this.updateBadge();
                        this.toast(`🗑️ تم مسح ${deleted} كرت مشاركة`);
                    }
                );
            }

            clearAll() {
                const count = this.storage.getWords().length;
                if (count === 0) {
                    this.toast('⚠️ لا توجد كروت للمسح');
                    return;
                }
                this.showConfirmModal(
                    'مسح جميع الكروت',
                    `سيتم حذف جميع كروت (<strong>${count}</strong> كرت) نهائياً. هذا الإجراء لا يمكن التراجع عنه.`,
                    () => {
                        const deleted = this.storage.clearAll();
                        this.renderStats();
                        this.renderTable();
                        this.populateTypeFilter();
                        this.populateOwnerFilter();
                        this.updateBadge();
                        this.toast(`🗑️ تم مسح ${deleted} كرت بالكامل`);
                    }
                );
            }

            showEditModal(id) {
                const word = this.storage.getWords().find(w => w.id === id);
                if (!word) return;
                const container = document.getElementById('modalContainer');
                const types = this.storage.getTypes();
                const owners = this.storage.getOwners();

                let typeOpts = types.map(t =>
                    `<option value="${t}" ${t===word.type?'selected':''}>${t}</option>`
                ).join('');

                let ownerOpts = owners.map(o =>
                    `<option value="${o}" ${o===word.owner?'selected':''}>${o}</option>`
                ).join('');

                container.innerHTML = `
                    <div class="modal-overlay" id="editOverlay">
                        <div class="modal">
                            <h2><span><i class="fas fa-edit"></i> تعديل</span><span class="close" id="closeEdit">&times;</span></h2>
                            <div class="form-group">
                                <label>رقم الكرت</label>
                                <input type="text" id="editWord" value="${word.word}">
                            </div>
                            <div class="form-group">
                                <label>فئة الكرت</label>
                                <select id="editType">${typeOpts}</select>
                            </div>
                            <div class="form-group">
                                <label>الشبكات</label>
                                <select id="editOwner">${ownerOpts}</select>
                            </div>
                            <div class="form-group">
                                <div class="hint">⚠️ لا يمكن تكرار نفس الرقم في نفس الشبكة</div>
                            </div>
                            <button class="btn btn-success" id="saveEdit" style="width:100%;justify-content:center;padding:8px;"><i class="fas fa-save"></i> حفظ</button>
                        </div>
                    </div>
                `;

                document.getElementById('closeEdit').onclick = () => container.innerHTML = '';
                document.getElementById('editOverlay').onclick = (e) => {
                    if (e.target === e.currentTarget) container.innerHTML = '';
                };

                document.getElementById('saveEdit').onclick = () => {
                    const newWord = document.getElementById('editWord').value.trim();
                    const newType = document.getElementById('editType').value;
                    const newOwner = document.getElementById('editOwner').value;
                    if (!newWord) { this.toast('❌ أدخل كرت'); return; }
                    
                    const result = this.storage.updateWord(id, { word: newWord, type: newType, owner: newOwner });
                    if (result) {
                        this.renderStats();
                        this.renderTable();
                        this.populateTypeFilter();
                        this.populateOwnerFilter();
                        this.toast(`✅ تم تحديث "${newWord}"`);
                        container.innerHTML = '';
                    } else {
                        this.toast(`⚠️ رقم "${newWord}" موجود بالفعل في شبكة "${newOwner}"`);
                    }
                };
            }

            showAddModal() {
                const container = document.getElementById('modalContainer');
                const types = this.storage.getTypes();
                const owners = this.storage.getOwners();

                let typeOpts = types.map(t => `<option value="${t}">${t}</option>`).join('');
                let ownerOpts = owners.map(o => `<option value="${o}">${o}</option>`).join('');

                container.innerHTML = `
                    <div class="modal-overlay" id="addOverlay">
                        <div class="modal">
                            <h2><span><i class="fas fa-plus"></i> إضافة كرت</span><span class="close" id="closeAdd">&times;</span></h2>
                            <div class="form-group">
                                <label>رقم الكرت</label>
                                <input type="text" id="addWord" placeholder="أدخل رقم الكرت">
                            </div>
                            <div class="form-group">
                                <label>فئة الكرت</label>
                                <select id="addType">${typeOpts}</select>
                            </div>
                            <div class="form-group">
                                <label>الشبكات</label>
                                <select id="addOwner">${ownerOpts}</select>
                            </div>
                            <div class="form-group">
                                <div class="hint">💡 يمكن إضافة نفس الرقم لشبكات مختلفة</div>
                                <div class="hint">⚠️ لا يمكن تكرار نفس الرقم في نفس الشبكة</div>
                            </div>
                            <button class="btn btn-success" id="saveAdd" style="width:100%;justify-content:center;padding:8px;"><i class="fas fa-save"></i> حفظ</button>
                        </div>
                    </div>
                `;

                document.getElementById('closeAdd').onclick = () => container.innerHTML = '';
                document.getElementById('addOverlay').onclick = (e) => {
                    if (e.target === e.currentTarget) container.innerHTML = '';
                };

                document.getElementById('saveAdd').onclick = () => {
                    const word = document.getElementById('addWord').value.trim();
                    const type = document.getElementById('addType').value;
                    const owner = document.getElementById('addOwner').value;
                    if (!word) { this.toast('❌ أدخل كرت'); return; }
                    
                    const result = this.storage.addWord(word, type, owner);
                    if (result.added) {
                        this.renderStats();
                        this.renderTable();
                        this.populateTypeFilter();
                        this.populateOwnerFilter();
                        this.updateBadge();
                        this.toast(`✅ تمت إضافة "${word}"`);
                        container.innerHTML = '';
                    } else if (result.reason === 'duplicate_same_owner') {
                        this.toast(`⚠️ رقم "${word}" موجود بالفعل في شبكة "${owner}"`);
                    } else {
                        this.toast(`⚠️ حدث خطأ أثناء الإضافة`);
                    }
                };
            }

            showTypesModal() {
                const container = document.getElementById('modalContainer');
                const types = this.storage.getTypes();
                let items = types.map(t => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#f7fafc;border-radius:8px;margin-bottom:4px;">
                        <span style="font-size:12px;">${t}</span>
                        <div style="display:flex;gap:4px;">
                            <i class="fas fa-edit" style="cursor:pointer;padding:3px 5px;color:#f59e0b;font-size:12px;" data-action="rename-type" data-type="${t}"></i>
                            <i class="fas fa-trash" style="cursor:pointer;padding:3px 5px;color:#dc2626;font-size:12px;" data-action="delete-type" data-type="${t}"></i>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="modal-overlay" id="typesOverlay">
                        <div class="modal">
                            <h2><span><i class="fas fa-tags"></i> إدارة الأنواع</span><span class="close" id="closeTypes">&times;</span></h2>
                            <div style="display:flex;gap:6px;margin-bottom:10px;">
                                <input type="text" id="newTypeInput" placeholder="نوع جديد" style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid #e2e8f0;background:#f7fafc;font-size:12px;">
                                <button class="btn btn-primary" id="addTypeBtn" style="padding:4px 10px;min-height:28px;"><i class="fas fa-plus"></i></button>
                            </div>
                            <div id="typesList">${items}</div>
                            <button class="btn btn-outline" id="closeTypesBtn" style="width:100%;margin-top:10px;padding:6px;font-size:12px;">إغلاق</button>
                        </div>
                    </div>
                `;

                document.getElementById('closeTypes').onclick = () => container.innerHTML = '';
                document.getElementById('closeTypesBtn').onclick = () => container.innerHTML = '';
                document.getElementById('typesOverlay').onclick = (e) => {
                    if (e.target === e.currentTarget) container.innerHTML = '';
                };

                document.getElementById('addTypeBtn').onclick = () => {
                    const val = document.getElementById('newTypeInput').value.trim();
                    if (!val) { this.toast('❌ أدخل اسم فئة الكرت'); return; }
                    if (this.storage.addType(val)) {
                        this.populateTypeFilter();
                        this.renderStats();
                        this.toast(`✅ تم إضافة "${val}"`);
                        this.showTypesModal();
                    } else {
                        this.toast(`⚠️ "${val}" موجود`);
                    }
                };

                container.querySelectorAll('[data-action="delete-type"]').forEach(el => {
                    el.onclick = () => {
                        const t = el.dataset.type;
                        if (this.storage.deleteType(t)) {
                            this.populateTypeFilter();
                            this.renderStats();
                            this.toast(`🗑️ تم حذف "${t}"`);
                            this.showTypesModal();
                        } else {
                            this.toast(`⚠️ لا يمكن حذف نوع كرت مستخدم`);
                        }
                    };
                });

                container.querySelectorAll('[data-action="rename-type"]').forEach(el => {
                    el.onclick = () => {
                        const old = el.dataset.type;
                        const newName = prompt(`تعديل "${old}"`, old);
                        if (newName && newName.trim() && newName.trim() !== old) {
                            if (this.storage.renameType(old, newName.trim())) {
                                this.populateTypeFilter();
                                this.renderStats();
                                this.renderTable();
                                this.toast(`✅ تم التعديل إلى "${newName}"`);
                                this.showTypesModal();
                            }
                        }
                    };
                });
            }

            showOwnersModal() {
                const container = document.getElementById('modalContainer');
                const owners = this.storage.getOwners();
                let items = owners.map(o => `
                    <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#f7fafc;border-radius:8px;margin-bottom:4px;">
                        <span style="font-size:12px;">${o}</span>
                        <div style="display:flex;gap:4px;">
                            <i class="fas fa-edit" style="cursor:pointer;padding:3px 5px;color:#f59e0b;font-size:12px;" data-action="rename-owner" data-owner="${o}"></i>
                            <i class="fas fa-trash" style="cursor:pointer;padding:3px 5px;color:#dc2626;font-size:12px;" data-action="delete-owner" data-owner="${o}"></i>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="modal-overlay" id="ownersOverlay">
                        <div class="modal">
                            <h2><span><i class="fas fa-users"></i> إدارة الشبكات</span><span class="close" id="closeOwners">&times;</span></h2>
                            <div style="display:flex;gap:6px;margin-bottom:10px;">
                                <input type="text" id="newOwnerInput" placeholder="شبكة جديدة" style="flex:1;padding:6px 10px;border-radius:8px;border:1px solid #e2e8f0;background:#f7fafc;font-size:12px;">
                                <button class="btn btn-primary" id="addOwnerBtn" style="padding:4px 10px;min-height:28px;"><i class="fas fa-plus"></i></button>
                            </div>
                            <div id="ownersList">${items}</div>
                            <button class="btn btn-outline" id="closeOwnersBtn" style="width:100%;margin-top:10px;padding:6px;font-size:12px;">إغلاق</button>
                        </div>
                    </div>
                `;

                document.getElementById('closeOwners').onclick = () => container.innerHTML = '';
                document.getElementById('closeOwnersBtn').onclick = () => container.innerHTML = '';
                document.getElementById('ownersOverlay').onclick = (e) => {
                    if (e.target === e.currentTarget) container.innerHTML = '';
                };

                document.getElementById('addOwnerBtn').onclick = () => {
                    const val = document.getElementById('newOwnerInput').value.trim();
                    if (!val) { this.toast('❌ أدخل اسم الشبكات'); return; }
                    if (this.storage.addOwner(val)) {
                        this.populateOwnerFilter();
                        this.renderStats();
                        this.toast(`✅ تم إضافة "${val}"`);
                        this.showOwnersModal();
                    } else {
                        this.toast(`⚠️ "${val}" موجود`);
                    }
                };

                container.querySelectorAll('[data-action="delete-owner"]').forEach(el => {
                    el.onclick = () => {
                        const o = el.dataset.owner;
                        if (this.storage.deleteOwner(o)) {
                            this.populateOwnerFilter();
                            this.renderStats();
                            this.toast(`🗑️ تم حذف "${o}"`);
                            this.showOwnersModal();
                        } else {
                            this.toast(`⚠️ لا يمكن حذف شبكة مستخدمة`);
                        }
                    };
                });

                container.querySelectorAll('[data-action="rename-owner"]').forEach(el => {
                    el.onclick = () => {
                        const old = el.dataset.owner;
                        const newName = prompt(`تعديل "${old}"`, old);
                        if (newName && newName.trim() && newName.trim() !== old) {
                            if (this.storage.renameOwner(old, newName.trim())) {
                                this.populateOwnerFilter();
                                this.renderStats();
                                this.renderTable();
                                this.toast(`✅ تم التعديل إلى "${newName}"`);
                                this.showOwnersModal();
                            }
                        }
                    };
                });
            }

            showExportModal() {
                const container = document.getElementById('modalContainer');
                
                container.innerHTML = `
                    <div class="modal-overlay" id="exportOverlay">
                        <div class="modal">
                            <h2>
                                <span><i class="fas fa-download"></i> تصدير واستيراد</span>
                                <span class="close" id="closeExport">&times;</span>
                            </h2>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
                                <button class="btn btn-primary" id="exportJsonBtn" style="flex:1;justify-content:center;padding:8px;font-size:12px;">
                                    <i class="fas fa-file-code"></i> تصدير JSON
                                </button>
                                <button class="btn btn-success" id="exportCsvBtn" style="flex:1;justify-content:center;padding:8px;font-size:12px;">
                                    <i class="fas fa-file-csv"></i> تصدير CSV
                                </button>
                            </div>
                            <div style="border-top:1px solid #e2e8f0;margin:10px 0;"></div>
                            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                                <button class="btn btn-outline" id="importFileBtn2" style="flex:1;justify-content:center;padding:8px;font-size:12px;">
                                    <i class="fas fa-file-import"></i> استيراد ملف
                                </button>
                            </div>
                            <button class="btn btn-outline" id="closeExportBtn" style="width:100%;margin-top:10px;padding:8px;font-size:12px;">
                                إغلاق
                            </button>
                        </div>
                    </div>
                `;
                
                document.getElementById('closeExport').onclick = () => container.innerHTML = '';
                document.getElementById('closeExportBtn').onclick = () => container.innerHTML = '';
                document.getElementById('exportOverlay').onclick = (e) => {
                    if (e.target === e.currentTarget) container.innerHTML = '';
                };
                
                document.getElementById('exportJsonBtn').onclick = () => {
                    container.innerHTML = '';
                    this.exportJSON();
                };
                
                document.getElementById('exportCsvBtn').onclick = () => {
                    container.innerHTML = '';
                    this.exportCSV();
                };
                
                document.getElementById('importFileBtn2').onclick = () => {
                    container.innerHTML = '';
                    fileProcessor.showImportFileModal();
                };
            }

            toast(msg) {
                const container = document.getElementById('toastContainer');
                const el = document.createElement('div');
                el.className = 'toast';
                el.textContent = msg;
                container.appendChild(el);
                setTimeout(() => {
                    el.style.opacity = '0';
                    el.style.transform = 'translateX(-50%) translateY(20px)';
                    setTimeout(() => el.remove(), 300);
                }, 3000);
            }

            switchPage(pageId) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(pageId).classList.add('active');
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.querySelector(`[data-page="${pageId}"]`).classList.add('active');
                this.currentPage = pageId;

                if (pageId === 'statsPage') {
                    this.renderStats();
                } else if (pageId === 'tablePage') {
                    this.renderTable();
                }
            }
        }

        // ==================== INIT ====================
        const storage = new Storage();
        const ui = new UI(storage);
        const fileProcessor = new FileProcessor(storage, ui);

        document.addEventListener('DOMContentLoaded', () => {
            ui.renderStats();
            ui.renderTable();
            ui.populateTypeFilter();
            ui.populateOwnerFilter();
            ui.updateBadge();

            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const page = this.dataset.page;
                    ui.switchPage(page);
                });
            });

            const dropdown = document.getElementById('moreDropdown');
            const moreBtn = document.getElementById('moreBtn');

            moreBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                dropdown.classList.toggle('show');
            });

            document.addEventListener('click', () => {
                dropdown.classList.remove('show');
            });

            document.getElementById('aboutBtn').addEventListener('click', () => {
                dropdown.classList.remove('show');
                ui.showAboutModal();
            });

            document.getElementById('importFileBtn').addEventListener('click', () => {
                dropdown.classList.remove('show');
                fileProcessor.showImportFileModal();
            });

            document.getElementById('clearCopiedBtn').addEventListener('click', () => {
                dropdown.classList.remove('show');
                ui.clearCopied();
            });

            document.getElementById('clearSharedBtn').addEventListener('click', () => {
                dropdown.classList.remove('show');
                ui.clearShared();
            });

            document.getElementById('clearAllBtn').addEventListener('click', () => {
                dropdown.classList.remove('show');
                ui.clearAll();
            });

            document.getElementById('searchInput').addEventListener('input', Utils.debounce((e) => {
                ui.filterText = e.target.value.trim();
                ui.renderTable();
            }, 250));

            document.getElementById('ownerFilter').addEventListener('change', (e) => {
                ui.filterOwner = e.target.value;
                ui.renderTable();
            });
            document.getElementById('typeFilter').addEventListener('change', (e) => {
                ui.filterType = e.target.value;
                ui.renderTable();
            });
            document.getElementById('statusFilter').addEventListener('change', (e) => {
                ui.filterStatus = e.target.value;
                ui.renderTable();
            });
            document.getElementById('sortBtn').addEventListener('click', () => {
                ui.sortDesc = !ui.sortDesc;
                ui.renderTable();
            });

            document.getElementById('importPdfBtn').addEventListener('click', () => fileProcessor.showPdfModal());
            document.getElementById('addBtn').addEventListener('click', () => ui.showAddModal());
            document.getElementById('typesBtn').addEventListener('click', () => ui.showTypesModal());
            document.getElementById('ownersBtn').addEventListener('click', () => ui.showOwnersModal());
            document.getElementById('exportBtn').addEventListener('click', () => ui.showExportModal());

            document.getElementById('darkToggle').addEventListener('click', () => {
                document.body.classList.toggle('dark');
                const icon = document.getElementById('darkToggle').querySelector('i');
                icon.classList.toggle('fa-moon');
                icon.classList.toggle('fa-sun');
            });

            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal-overlay')) {
                    document.getElementById('modalContainer').innerHTML = '';
                }
            });
        });

        // ====== دعم Android ======
        if (typeof Android !== 'undefined') {
            window.shareText = function(text) {
                if (Android && Android.share) {
                    Android.share(text);
                    return true;
                }
                return false;
            };
            
            window.showToast = function(message) {
                if (Android && Android.toast) {
                    Android.toast(message);
                    return true;
                }
                return false;
            };
            
            window.exitApp = function() {
                if (Android && Android.exitApp) {
                    Android.exitApp();
                    return true;
                }
                return false;
            };
            
            window.getAppVersion = function() {
                if (Android && Android.getAppVersion) {
                    return Android.getAppVersion();
                }
                return '1.0';
            };
            
            window.openUrl = function(url) {
                if (Android && Android.openUrl) {
                    Android.openUrl(url);
                    return true;
                }
                window.open(url, '_blank');
                return false;
            };
        }

        console.log('✅ تطبيق مدير الكروت جاهز');
    </script>
</body>
</html>
